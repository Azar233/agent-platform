name: visionpay-xshi

services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 4g
    environment:
      POSTGRES_DB: vp_agent
      POSTGRES_USER: vp_admin
      POSTGRES_PASSWORD: vp_admin
    ports:
      - "5432:5432"
    volumes:
      - /home/xshi/.local/share/visionpay/docker/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vp_admin -d vp_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 1g
    ports:
      - "6379:6379"
    volumes:
      - /home/xshi/.local/share/visionpay/docker/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 4g
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /home/xshi/.local/share/visionpay/docker/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
