# ==============================================================================
# Alembic Database Migration Configuration
# ==============================================================================
# Configuration:
#   [alembic]       - Core config: migration scripts location, database URL
#   [post_write_hooks] - Hooks executed after migration script generation
#   [loggers]       - Logging configuration

# ======================== Core Configuration ========================
[alembic]

# Path to migration scripts directory (relative to this config file)
script_location = alembic

# Migration script filename template
# Default format: {revision}_{slug}.py
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Path prepended to sys.path for importing project modules
prepend_sys_path = .

# Timezone for dates in migration scripts
# timezone =

# Max slug length in migration filenames
# truncate_slug_length = 40

# Version path separator (os = OS default, : on Linux/macOS, ; on Windows)
version_path_separator = os

# Migration script output encoding
# output_encoding = utf-8

# ======================== Database Connection ========================
# Format: postgresql://user:password@host:port/database
# NOTE: Override via environment variable in production
sqlalchemy.url = postgresql://vp_admin:vp_admin@localhost:5432/vp_agent


# ======================== Post-Write Hooks ========================
# Auto-run code formatter / linter after generating migration script
[post_write_hooks]

# Example: format with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Example: lint with ruff
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME


# ======================== Logging Configuration ========================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = DEBUG
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
